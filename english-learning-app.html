<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一只小蚊子的英语训练</title>
<style>
/* ========== 全局变量 ========== */
:root {
  --primary: #6C5CE7;
  --primary-light: #A29BFE;
  --primary-dark: #4834D4;
  --accent: #00CEC9;
  --accent-light: #81ECEC;
  --success: #00B894;
  --danger: #FF6B6B;
  --warning: #FDCB6E;
  --bg: #0F0E17;
  --bg-card: #1A1A2E;
  --bg-card-hover: #232342;
  --text: #FFFFFE;
  --text-secondary: #A7A9BE;
  --border: rgba(255,255,255,0.08);
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== 背景动画 ========== */
.bg-animation {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; overflow: hidden;
}
.bg-animation .orb {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
  animation: float 20s infinite ease-in-out;
}
.bg-animation .orb:nth-child(1) { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
.bg-animation .orb:nth-child(2) { width: 300px; height: 300px; background: var(--accent); bottom: -50px; right: -50px; animation-delay: -5s; }
.bg-animation .orb:nth-child(3) { width: 250px; height: 250px; background: var(--primary-light); top: 50%; left: 50%; animation-delay: -10s; }

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(50px, -30px) scale(1.1); }
  66% { transform: translate(-30px, 40px) scale(0.95); }
}

/* ========== 顶部导航 ========== */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px; background: rgba(15,14,23,0.8);
  backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px;
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; }
.logo-icon {
  width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 4px 15px rgba(108,92,231,0.4);
}
.logo span { background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.nav-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.nav-tab {
  padding: 8px 14px; border-radius: 8px; cursor: pointer;
  color: var(--text-secondary); font-size: 13px; font-weight: 600;
  transition: var(--transition); border: 1px solid transparent; background: none;
}
.nav-tab:hover { color: var(--text); background: var(--bg-card); }
.nav-tab.active {
  color: var(--text); background: rgba(108,92,231,0.2);
  border-color: rgba(108,92,231,0.3);
}

.streak-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; background: rgba(253,203,110,0.15);
  border: 1px solid rgba(253,203,110,0.3); border-radius: 10px;
  font-size: 14px; font-weight: 700; color: var(--warning);
}
.version-badge {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px; background: rgba(0,206,201,0.12);
  border: 1px solid rgba(0,206,201,0.25); border-radius: 8px;
  font-size: 12px; font-weight: 600; color: var(--accent);
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  letter-spacing: 0.5px;
}

/* ========== 主内容区 ========== */
.main { max-width: 1200px; margin: 0 auto; padding: 16px 24px; }
.view { display: none; animation: fadeIn 0.4s ease; }
.view.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ========== 首页 Dashboard ========== */
.welcome-card {
  background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(0,206,201,0.1));
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 32px; text-align: center; margin-bottom: 16px; position: relative; overflow: hidden;
}
.welcome-card h1 { font-size: 24px; margin-bottom: 4px; }
.welcome-card p { color: var(--text-secondary); font-size: 14px; }

.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; text-align: center;
  transition: var(--transition);
}
.stat-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
.stat-icon { font-size: 24px; margin-bottom: 4px; }
.stat-value { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-label { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }

.level-selector { margin-bottom: 16px; }
.level-selector h3 { margin-bottom: 10px; font-size: 16px; }
.level-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.level-card {
  background: var(--bg-card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 16px; cursor: pointer;
  transition: var(--transition); position: relative;
}
.level-card:hover { border-color: var(--primary-light); transform: translateY(-3px); box-shadow: var(--shadow); }
.level-card.active { border-color: var(--primary); background: rgba(108,92,231,0.1); }
.level-card h4 { font-size: 18px; margin-bottom: 6px; }
.level-card p { color: var(--text-secondary); font-size: 13px; }
.level-card .word-count { position: absolute; top: 16px; right: 16px; font-size: 12px; color: var(--accent); font-weight: 700; }
.level-card .progress-bar { margin-top: 12px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.level-card .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 3px; transition: width 0.5s; }

/* ========== 闪卡模块 ========== */
.flashcard-container { perspective: 1000px; max-width: 600px; margin: 0 auto; }
.flashcard {
  width: 100%; height: 340px; position: relative;
  transform-style: preserve-3d; transition: transform 0.6s;
  cursor: pointer;
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px 32px; border: 1px solid var(--border);
}
.flashcard-front {
  background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
}
.flashcard-back {
  background: linear-gradient(135deg, var(--primary-dark), var(--bg-card));
  transform: rotateY(180deg);
}
.flashcard-word { font-size: 36px; font-weight: 800; margin-bottom: 6px; text-align: center; }
.flashcard-phonetic { font-size: 18px; color: var(--accent); font-style: italic; margin-bottom: 16px; }
.flashcard-meaning { font-size: 22px; color: var(--text); text-align: center; line-height: 1.6; }
.flashcard-example { font-size: 15px; color: var(--text-secondary); text-align: center; margin-top: 12px; font-style: italic; line-height: 1.5; }
.flashcard-example strong { color: var(--accent-light); font-style: normal; }
.flashcard-hint { position: absolute; bottom: 16px; font-size: 12px; color: var(--text-secondary); }
.flashcard-cn { font-size: 20px; color: var(--text-secondary); margin-bottom: 10px; text-align: center; font-weight: 600; }

/* ========== 音标可点击+悬停变色 ========== */
.phonetic-symbols { display: flex; gap: 1px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; min-height: 28px; }
.phoneme-wrap { display: inline-block; vertical-align: bottom; }
.phoneme {
  display: inline-block; font-size: 22px; color: var(--accent);
  cursor: pointer; padding: 2px 5px; border-radius: 6px;
  transition: color 0.2s, background 0.2s;
  font-family: 'Charis SIL', 'Doulos SIL', 'Gentium Plus', 'Lucida Sans Unicode', 'Cambria', 'Times New Roman', serif;
  line-height: 1.6em; letter-spacing: 0.5px;
}
.phoneme:hover { color: var(--warning); background: rgba(253,203,110,0.15); }
.phoneme:active { color: var(--danger); }
.phoneme.stress { color: var(--warning); font-weight: 700; font-size: 18px; }
.phoneme.stress:hover { background: rgba(253,203,110,0.2); color: var(--accent-light); }
.phoneme.muted { cursor: default; color: var(--text-secondary); opacity: 0.4; }
.phoneme.muted:hover { background: none; color: var(--text-secondary); }
.phoneme.playing { color: var(--danger); background: rgba(255,107,107,0.15); }
.phoneme.highlight-sync { color: var(--danger) !important; background: rgba(255,107,107,0.18) !important; }

/* ========== 音乐按钮 ========== */
.music-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 18px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
.music-btn:hover { background: rgba(255,255,255,0.12); }
.music-btn.playing { color: var(--success); border-color: rgba(107,203,119,0.4); }
.music-btn.playing #musicIcon { animation: musicSpin 3s linear infinite; }
@keyframes musicSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.music-now-playing { font-size: 12px; color: var(--text-secondary); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ========== 单词字母高亮 ========== */
.flashcard-word .word-letter { transition: color 0.15s, text-shadow 0.15s, transform 0.15s, font-weight 0.15s; display: inline-block; }

/* ========== 单词卡语速控制 ========== */
.fc-speed-control { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 16px; }
.fc-speed-label { color: var(--text-secondary); font-size: 13px; font-weight: 600; }

.card-controls { display: flex; justify-content: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }

/* ========== 已掌握单词库折叠区 ========== */
.mastered-section { margin-top: 28px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); overflow: hidden; }
.mastered-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; user-select: none; }
.mastered-header:hover { background: rgba(255,255,255,0.04); }
.mastered-toggle { margin-left: auto; }
.mastered-body.collapsed { max-height: 0 !important; }
.mastered-body.expanded { max-height: 600px; overflow-y: auto; padding: 0 20px 16px; }
.mastered-group { margin-bottom: 14px; }
.mastered-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.mastered-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.mastered-chip { background: rgba(107,203,119,0.12); border: 1px solid rgba(107,203,119,0.3); border-radius: 8px; padding: 6px 12px; cursor: pointer; transition: all 0.2s; }
.mastered-chip:hover { background: rgba(107,203,119,0.22); transform: translateY(-2px); }
.btn {
  padding: 10px 22px; border-radius: 10px; border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: var(--transition); display: flex; align-items: center; gap: 6px;
}
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
.btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-card-hover); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,184,148,0.4); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,107,107,0.4); }
.btn-accent { background: var(--accent); color: var(--bg); }
.btn-accent:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,206,201,0.4); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.card-progress { text-align: center; margin-top: 16px; color: var(--text-secondary); font-size: 14px; }
.card-dots { display: flex; justify-content: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.card-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: var(--transition); cursor: pointer; }
.card-dot.active { background: var(--primary); transform: scale(1.3); }
.card-dot.learned { background: var(--success); }

/* ========== 测验模块 ========== */
.quiz-container { max-width: 700px; margin: 0 auto; }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.quiz-progress-text { color: var(--text-secondary); font-size: 14px; }
.quiz-timer { display: flex; align-items: center; gap: 6px; color: var(--accent); font-weight: 700; }
.quiz-progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-bottom: 32px; }
.quiz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; transition: width 0.3s; }

.quiz-question {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px; margin-bottom: 24px;
}
.quiz-question-text { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.quiz-question-hint { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }

.quiz-options { display: grid; gap: 12px; }
.quiz-option {
  padding: 16px 20px; background: var(--bg-card); border: 2px solid var(--border);
  border-radius: 12px; cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: 12px; font-size: 16px;
}
.quiz-option:hover { border-color: var(--primary-light); background: var(--bg-card-hover); }
.quiz-option.selected { border-color: var(--primary); background: rgba(108,92,231,0.1); }
.quiz-option.correct { border-color: var(--success); background: rgba(0,184,148,0.1); }
.quiz-option.wrong { border-color: var(--danger); background: rgba(255,107,107,0.1); }
.quiz-option-letter {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
}
.quiz-option.correct .quiz-option-letter { background: var(--success); }
.quiz-option.wrong .quiz-option-letter { background: var(--danger); }

.quiz-result { text-align: center; padding: 40px; }
.quiz-score { font-size: 64px; font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 16px 0; }
.quiz-result-msg { font-size: 18px; color: var(--text-secondary); margin-bottom: 24px; }

/* ========== 拼写模块 ========== */
.spelling-container { max-width: 600px; margin: 0 auto; }
.spelling-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 40px; text-align: center;
}
.spelling-meaning { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.spelling-phonetic { color: var(--accent); font-size: 16px; margin-bottom: 24px; }
.spelling-input {
  width: 100%; padding: 16px 20px; background: var(--bg);
  border: 2px solid var(--border); border-radius: 12px;
  color: var(--text); font-size: 22px; text-align: center;
  letter-spacing: 2px; transition: var(--transition); outline: none;
}
.spelling-input:focus { border-color: var(--primary); }
.spelling-input.correct { border-color: var(--success); background: rgba(0,184,148,0.1); }
.spelling-input.wrong { border-color: var(--danger); background: rgba(255,107,107,0.1); }
.spelling-hint { margin-top: 16px; font-size: 14px; color: var(--text-secondary); min-height: 20px; }
.spelling-hint .letter-hint { font-size: 20px; letter-spacing: 4px; font-weight: 700; color: var(--primary-light); }

/* ========== 听力模块 ========== */
.listening-container { max-width: 600px; margin: 0 auto; }
.listen-mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
.listen-mode-card {
  background: var(--bg); border: 2px solid var(--border); border-radius: 14px;
  padding: 28px 20px; cursor: pointer; transition: var(--transition); text-align: center;
}
.listen-mode-card:hover { border-color: var(--primary-light); background: var(--bg-card-hover); transform: translateY(-4px); }
.listen-mode-card.active { border-color: var(--primary); background: rgba(108,92,231,0.12); }
.listen-mode-icon { font-size: 40px; margin-bottom: 12px; }
.listen-mode-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.listen-mode-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.listen-mode-tag {
  display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
  margin-bottom: 16px;
}
.listen-mode-tag.new { background: rgba(0,206,201,0.15); color: var(--accent); border: 1px solid rgba(0,206,201,0.3); }
.listen-mode-tag.mixed { background: rgba(253,203,110,0.15); color: var(--warning); border: 1px solid rgba(253,203,110,0.3); }
.listening-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 40px; text-align: center;
}
.listen-btn {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin: 0 auto 24px; transition: var(--transition);
  box-shadow: 0 8px 24px rgba(108,92,231,0.3);
}
.listen-btn:hover { transform: scale(1.1); }
.listen-btn.playing { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

.listen-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
.listen-option {
  padding: 16px; background: var(--bg); border: 2px solid var(--border);
  border-radius: 12px; cursor: pointer; transition: var(--transition); font-size: 16px;
}
.listen-option:hover { border-color: var(--primary-light); }
.listen-option.correct { border-color: var(--success); background: rgba(0,184,148,0.1); }
.listen-option.wrong { border-color: var(--danger); background: rgba(255,107,107,0.1); }

.speed-control { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.speed-btn {
  padding: 6px 14px; border-radius: 8px; background: var(--bg);
  border: 1px solid var(--border); color: var(--text-secondary);
  cursor: pointer; font-size: 13px; transition: var(--transition);
}
.speed-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ========== 设置面板 ========== */
.settings-panel { max-width: 600px; margin: 0 auto; }
.setting-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 12px;
}
.setting-label { font-size: 16px; }
.setting-desc { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.toggle {
  width: 48px; height: 26px; background: rgba(255,255,255,0.1);
  border-radius: 13px; position: relative; cursor: pointer; transition: var(--transition);
}
.toggle.on { background: var(--primary); }
.toggle::after {
  content: ''; position: absolute; width: 20px; height: 20px;
  background: white; border-radius: 50%; top: 3px; left: 3px;
  transition: var(--transition);
}
.toggle.on::after { left: 25px; }

/* ========== Toast ========== */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  padding: 14px 28px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: var(--shadow); font-size: 14px; font-weight: 600;
  z-index: 200; opacity: 0; pointer-events: none; transition: var(--transition);
}
.toast.show { opacity: 1; bottom: 40px; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .header { flex-direction: column; gap: 12px; padding: 16px; }
  .nav-tabs { flex-wrap: wrap; justify-content: center; }
  .main { padding: 16px; }
  .flashcard { height: 360px; }
  .flashcard-word { font-size: 32px; }
  .listen-options { grid-template-columns: 1fr; }
}

/* 滚动条 */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .header { padding: 8px 16px; }
  .logo { font-size: 15px; gap: 8px; }
  .logo-icon { width: 32px; height: 32px; font-size: 16px; }
  .nav-tabs { gap: 4px; }
  .nav-tab { padding: 6px 10px; font-size: 12px; }
  .main { padding: 12px 16px; }
  .welcome-card { padding: 16px 20px; margin-bottom: 12px; }
  .welcome-card h1 { font-size: 20px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card { padding: 12px; }

#authOverlay {

  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(20px); background: rgba(15,14,23,0.85);
}
#authOverlay.hidden { display: none !important; }

.auth-container {
  width: 400px; max-width: 90vw;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 40px 32px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  animation: authSlideIn 0.4s ease-out;
}
@keyframes authSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-logo {
  text-align: center; margin-bottom: 32px;
}
.auth-logo .logo-icon {
  font-size: 48px; display: block; margin-bottom: 12px;
}
.auth-logo h2 {
  font-size: 22px; font-weight: 800; color: var(--text);
}
.auth-logo p {
  color: var(--text-secondary); font-size: 13px; margin-top: 4px;
}

.auth-tabs {
  display: flex; gap: 0; margin-bottom: 24px;
  border-radius: 12px; overflow: hidden;
  border: 1px solid var(--border);
}
.auth-tab {
  flex: 1; padding: 10px; text-align: center;
  background: transparent; color: var(--text-secondary);
  border: none; cursor: pointer; font-size: 14px; font-weight: 600;
  transition: var(--transition);
}
.auth-tab.active {
  background: var(--primary); color: #fff;
}

.auth-form input {
  width: 100%; padding: 14px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font-size: 15px; outline: none;
  transition: var(--transition); margin-bottom: 16px;
}
.auth-form input:focus {
  border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(108,92,231,0.2);
}
.auth-form input::placeholder { color: var(--text-secondary); opacity: 0.5; }

.auth-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: var(--transition);
}
.auth-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,92,231,0.35); }
.auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

.auth-msg {
  text-align: center; font-size: 13px; margin-top: 16px;
  min-height: 20px;
}
.auth-msg.error { color: var(--danger); }
.auth-msg.success { color: var(--success); }

.auth-footer {
  text-align: center; margin-top: 20px;
  color: var(--text-secondary); font-size: 13px;
}

/* 用户头像区域 */

  display: flex; align-items: center; gap: 8px;

}

<script>
// ========== Supabase 云端配置 ==========
const SUPABASE_URL = 'https://rfmvjbxmfesqlmtyzgbl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_uOwaQxCrO22o4vQs_Quubw_DsXVUw2g';
const sbClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let currentUser = null;        // 当前登录用户
let isOnline = navigator.onLine;  // 网络状态
let syncPending = false;       // 待同步标记
let cloudDataLoaded = false;   // 云端数据是否已加载完成

// ========== 认证状态管理 ==========

// 切换登录/注册标签页
function switchAuthTab(tab) {
  const loginTab = document.getElementById('authLoginTab');
  const registerTab = document.getElementById('authRegisterTab');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const footerText = document.getElementById('authFooterText');

  if (tab === 'login') {
    loginTab.classList.add('active'); registerTab.classList.remove('active');
    loginForm.style.display = ''; registerForm.style.display = 'none';
    footerText.innerHTML = '还没有账号？<a href="#" onclick="switchAuthTab(\'register\');return false;" style="color:var(--primary-light);font-weight:600;text-decoration:none;">立即注册</a>';
  } else {
    registerTab.classList.add('active'); loginTab.classList.remove('active');
    registerForm.style.display = ''; loginForm.style.display = 'none';
    footerText.innerHTML = '已有账号？<a href="#" onclick="switchAuthTab(\'login\');return false;" style="color:var(--primary-light);font-weight:600;text-decoration:none;">去登录</a>';
  }
  clearAuthMsg();
}

function setAuthMsg(msg, isError) {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = 'auth-msg' + (isError ? ' error' : '');
}

function clearAuthMsg() { document.getElementById('authMsg').textContent = ''; }

// 注册
async function handleRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;

  if (!email || !password) return setAuthMsg('请填写邮箱和密码', true);
  if (password.length < 6) return setAuthMsg('密码至少需要6个字符', true);

  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '注册中...';

  try {
    const { data, error } = await sbClient.auth.signUp({ email, password });
    if (error) throw error;

    if (data.user && !data.session) {
      // 邮箱确认模式：需要先验证邮箱
      setAuthMsg('注册成功！请前往邮箱点击确认链接，然后回来登录', false);
      setTimeout(() => switchAuthTab('login'), 3000);
    } else {
      currentUser = data.user;
      hideAuthUI();
      showUserArea(data.user.email || data.user.user_metadata?.name || '用户');
      updateSyncIndicator('已登录');
      // 初始化新用户的云端进度
      await initCloudProgress();
      showToast('🎉 注册成功！欢迎加入！');
    }
  } catch (e) {
    setAuthMsg('注册失败: ' + (e.message || e.error_description || '未知错误'), true);
  }
  btn.disabled = false; btn.textContent = '注册账号';
}

// 登录
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) return setAuthMsg('请填写邮箱和密码', true);

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中...';

  try {
    const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
    if (error) throw error;

    currentUser = data.user;
    hideAuthUI();
    showUserArea(data.user.email || '用户');
    updateSyncIndicator('已登录');

    // 加载云端进度
    await loadCloudProgress();

    showToast('✅ 欢迎回来！数据已从云端同步');
  } catch (e) {
    setAuthMsg('登录失败: ' + (e.message || e.error_description || '邮箱或密码错误'), true);
  }
  btn.disabled = false; btn.textContent = '登录';
}

// 登出
async function handleLogout() {
  try {
    await sbClient.auth.signOut();
  } catch(e) {}
  currentUser = null;
  cloudDataLoaded = false;
  hideUserArea();
  showAuthUI();
  updateSyncIndicator('');
  showToast('已退出登录，数据保存在本地');
}

// 监听认证状态变化（页面刷新时自动恢复会话）
sbClient?.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session && session.user) {
    currentUser = session.user;
    hideAuthUI();
    showUserArea(session.user.email || '用户');
    updateSyncIndicator('已登录');
    if (!cloudDataLoaded) {
      await loadCloudProgress();
    }
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    cloudDataLoaded = false;
    hideUserArea();
    showAuthUI();
    updateSyncIndicator('');
  }
});

// UI 显示控制
function hideAuthUI() { document.getElementById('authOverlay').classList.add('hidden'); }
function showAuthUI() { document.getElementById('authOverlay').classList.remove('hidden'); }

function showUserArea(emailOrName) {
  const ua = document.getElementById('userArea');
  ua.style.display = 'flex';
  const name = extractDisplayName(emailOrName);
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
}

function hideUserArea() { document.getElementById('userArea').style.display = 'none'; }

function extractDisplayName(val) {
  if (!val) return '用户';
  if (val.includes('@')) return val.split('@')[0];
  return val;
}

// 同步状态指示器
function updateSyncIndicator(text) {
  const el = document.getElementById('syncIndicator');
  if (!text) { el.style.display = 'none'; return; }
  el.style.display = '';
  document.getElementById('syncText').textContent = text;
  el.className = 'sync-indicator' + (!isOnline ? ' offline' : '');
}
function setSyncing() {
  const el = document.getElementById('syncIndicator');
  el.className = 'sync-indicator syncing';
  document.getElementById('syncIcon').textContent = '⏳';
  document.getElementById('syncText').textContent = '同步中...';
}
function setSyncDone() {
  const el = document.getElementById('syncIndicator');
  el.className = 'sync-indicator';
  document.getElementById('syncIcon').textContent = '☁️';
  document.getElementById('syncText').textContent = '已同步';
}

// ========== 云端数据同步 ==========

// 初始化新用户的云端记录
async function initCloudProgress() {
  if (!currentUser || !isOnline) return;
  try {
    const progressData = getProgressForCloud();
    await sbClient.from('user_progress').upsert({
      user_id: currentUser.id,
      active_cards: progressData.activeCards,
      mastered_unified: progressData.masteredUnified,
      learned_unified: progressData.learnedUnified,
      next_pool_idx: progressData.nextPoolIdx,
      current_bank: state.currentBank,
      mastered_card_index: progressData.masteredCardIndex
    }, { onConflict: 'user_id' });
  } catch(e) { console.warn('云端初始化失败:', e); }
}

// 从云端加载进度
async function loadCloudProgress() {
  if (!currentUser) return;
  cloudDataLoaded = true;

  if (!isOnline) {
    console.log('离线状态，使用本地缓存数据');
    updateSyncIndicator('离线(本地)');
    return;
  }

  try {
    setSyncing();
    const { data, error } = await sbClient
      .from('user_progress')
      .select('*')
      .eq('user_id', currentUser.id)
      .single();

    if (error || !data) {
      // 云端没有数据 → 上传本地数据
      console.log('云端无数据，上传本地数据...');
      await uploadLocalToCloud();
      setSyncDone();
      return;
    }

    // 用云端数据覆盖本地
    applyCloudData(data);
    saveState(); // 保存到 localStorage 作为备份
    ensureActiveCards();
    renderDashboard();
    setSyncDone();
  } catch(e) {
    console.warn('云端加载失败:', e);
    updateSyncIndicator('同步失败');
  }
}

// 上传本地数据到云端
async function uploadLocalToCloud() {
  if (!currentUser || !isOnline) return;
  try {
    const progressData = getProgressForCloud();
    await sbClient.from('user_progress').upsert({
      user_id: currentUser.id,
      ...progressData
    }, { onConflict: 'user_id' });
  } catch(e) { console.warn('云端上传失败:', e); }
}

// 获取当前进度数据（用于云端存储）
function getProgressForCloud() {
  return {
    active_cards: state.activeCards || [],
    mastered_unified: state.masteredUnified || [],
    learned_unified: state.learnedUnified || [],
    next_pool_idx: state.nextPoolIdx || 0,
    current_bank: state.currentLevel,
    mastered_card_index: state.masteredCardIndex || 0
  };
}

// 将云端数据应用到本地 state
function applyCloudData(data) {
  if (data.active_cards) state.activeCards = data.active_cards;
  if (data.mastered_unified) state.masteredUnified = data.mastered_unified;
  if (data.learned_unified) state.learnedUnified = data.learned_unified;
  if (data.next_pool_idx !== null && data.next_pool_idx !== undefined) state.nextPoolIdx = data.next_pool_idx;
  if (data.current_bank) state.currentLevel = data.current_bank;
  if (data.mastered_card_index !== null && data.mastered_card_index !== undefined) state.masteredCardIndex = data.mastered_card_index;
}

// 网络监听
window.addEventListener('online', () => { isOnline = true; if (currentUser) { uploadLocalToCloud(); setSyncDone(); } else updateSyncIndicator(''); });
window.addEventListener('offline', () => { isOnline = false; if (currentUser) updateSyncIndicator('离线(本地)'); });

const DIFFICULTY_ORDER = ['basic', 'daily', 'phrases', 'cet4', 'cet6', 'business'];
let UNIFIED_WORDS = [];

function buildUnifiedWords() {
  UNIFIED_WORDS = [];
  for (const key of DIFFICULTY_ORDER) {
    const bank = WORD_BANKS[key];
    if (!bank) continue;
    bank.words.forEach((w, idx) => {
      UNIFIED_WORDS.push({ ...w, bankKey: key, bankName: bank.name, bankIcon: bank.icon, origIdx: idx });
    });
  }
}

// 使用 Web Audio API 生成10首舒缓音乐，随机播放
let bgMusicCtx = null;
let bgMusicGain = null;
let bgMusicPlaying = false;
let bgMusicNodes = [];
let bgMusicTimer = null;
let bgMusicTrackIndex = -1;

// 10首舒缓音乐配置（不同音阶/和弦/速度）
const BG_MUSIC_TRACKS = [

  { name: '星河入梦', scale: [164.81, 196.00, 220.00, 246.94, 293.66], wave: 'triangle', tempo: 6500, bass: 82.41 },
];

function initBgMusic() {
  if (bgMusicCtx) return;
  bgMusicCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgMusicGain = bgMusicCtx.createGain();
  bgMusicGain.gain.value = 0.08; // 低音量，不干扰学习
  bgMusicGain.connect(bgMusicCtx.destination);
}

function playMusicTrack(track) {
  stopMusicNodes();
  const ctx = bgMusicCtx;
  const now = ctx.currentTime;

  // 低音持续 pad
  const bassOsc = ctx.createOscillator();
  const bassGain = ctx.createGain();
  bassOsc.type = 'sine';
  bassOsc.frequency.value = track.bass;
  bassGain.gain.value = 0.3;
  bassGain.gain.setValueAtTime(0, now);
  bassGain.gain.linearRampToValueAtTime(0.3, now + 2);
  bassOsc.connect(bassGain);
  bassGain.connect(bgMusicGain);
  bassOsc.start(now);
  bgMusicNodes.push(bassOsc, bassGain);

  // 旋律音符循环
  let noteTime = now;
  const noteInterval = track.tempo / track.scale.length;

  function scheduleNotes() {
    if (!bgMusicPlaying) return;
    const scheduleAhead = 8; // 预排8个音符
    for (let i = 0; i < scheduleAhead; i++) {
      const freq = track.scale[Math.floor(Math.random() * track.scale.length)];
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = track.wave;
      osc.frequency.value = freq;

      const noteDur = noteInterval / 1000 * (0.6 + Math.random() * 0.4);
      gain.gain.setValueAtTime(0, noteTime);
      gain.gain.linearRampToValueAtTime(0.15, noteTime + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, noteTime + noteDur);

      osc.connect(gain);
      gain.connect(bgMusicGain);
      osc.start(noteTime);
      osc.stop(noteTime + noteDur + 0.5);
      bgMusicNodes.push(osc, gain);

      noteTime += noteInterval / 1000;
    }
  }

  scheduleNotes();

  // 循环排程
  bgMusicTimer = setInterval(() => {
    if (bgMusicPlaying) scheduleNotes();
  }, noteInterval * 4 / 1000 * 1000);

  // 和弦 pad（每8秒切换一次和弦）
  const chordInterval = setInterval(() => {
    if (!bgMusicPlaying) { clearInterval(chordInterval); return; }
    const root = track.scale[Math.floor(Math.random() * 3)];
    [1, 1.25, 1.5].forEach((mult, idx) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = root * mult;
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 1.5);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 7);
      osc.connect(gain);
      gain.connect(bgMusicGain);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 8);
      bgMusicNodes.push(osc, gain);
    });
  }, 8000);
  bgMusicNodes.push({ stop: () => clearInterval(chordInterval) });
}

function stopMusicNodes() {
  if (bgMusicTimer) { clearInterval(bgMusicTimer); bgMusicTimer = null; }
  bgMusicNodes.forEach(node => {
    try {
      if (node.stop) node.stop();
      if (node.disconnect) node.disconnect();
    } catch(e) {}
  });
  bgMusicNodes = [];
}

function pickRandomTrack() {
  let idx;
  do {
    idx = Math.floor(Math.random() * BG_MUSIC_TRACKS.length);
  } while (idx === bgMusicTrackIndex && BG_MUSIC_TRACKS.length > 1);
  return idx;
}

function startBgMusic() {
  initBgMusic();
  if (bgMusicCtx.state === 'suspended') bgMusicCtx.resume();
  bgMusicPlaying = true;
  bgMusicTrackIndex = pickRandomTrack();
  const track = BG_MUSIC_TRACKS[bgMusicTrackIndex];
  playMusicTrack(track);

  document.getElementById('musicBtn').classList.add('playing');
  document.getElementById('musicIcon').textContent = '🎶';
  showToast('🎵 正在播放：' + track.name, 'success');

  // 自动切换到下一首
  bgMusicNodes.push({ stop: () => {} }); // placeholder
  scheduleNextTrack(track.tempo * 3); // 每首约3轮
}

function scheduleNextTrack(delay) {
  setTimeout(() => {
    if (!bgMusicPlaying) return;
    stopMusicNodes();
    bgMusicTrackIndex = pickRandomTrack();
    const track = BG_MUSIC_TRACKS[bgMusicTrackIndex];
    playMusicTrack(track);
    showToast('🎵 换曲：' + track.name, 'success');
    scheduleNextTrack(track.tempo * 3);
  }, delay);
}

function stopBgMusic() {
  bgMusicPlaying = false;
  stopMusicNodes();
  if (bgMusicCtx) bgMusicCtx.suspend();
  document.getElementById('musicBtn').classList.remove('playing');
  document.getElementById('musicIcon').textContent = '🎵';
}

function toggleBgMusic() {
  if (bgMusicPlaying) {
    stopBgMusic();
    showToast('音乐已暂停', 'info');
  } else {
    startBgMusic();
  }
}

function saveState() {
  const saveData = {
    currentLevel: state.currentLevel,
    learnedWords: Object.fromEntries(Object.entries(state.learnedWords).map(([k,v]) => [k, [...v]])),
    masteredWords: Object.fromEntries(Object.entries(state.masteredWords).map(([k,v]) => [k, [...v]])),
    activeCards: state.activeCards,
    nextPoolIdx: state.nextPoolIdx,
    masteredUnified: state.masteredUnified,
    learnedUnified: state.learnedUnified,
    masteredCardIndex: state.masteredCardIndex,
    settings: state.settings,
    stats: state.stats,
    cardOrder: state.cardOrder
  };
  localStorage.setItem('leximaster_data', JSON.stringify(saveData));

  // 云端同步（防抖：2秒内只同步一次）
  if (currentUser && isOnline) {
    if (window._syncTimer) clearTimeout(window._syncTimer);
    window._syncTimer = setTimeout(async () => {
      await uploadLocalToCloud();
      setSyncDone();
    }, 2000);
  }
}

function loadState() {
  const data = localStorage.getItem('leximaster_data');
  if (data) {
    const parsed = JSON.parse(data);
    state.currentLevel = parsed.currentLevel || 'basic';
    state.learnedWords = {};
    state.masteredWords = {};
    for (const [k, v] of Object.entries(parsed.learnedWords || {})) {
      state.learnedWords[k] = new Set(v);
    }
    for (const [k, v] of Object.entries(parsed.masteredWords || {})) {
      state.masteredWords[k] = new Set(v);
    }
    state.activeCards = parsed.activeCards || [];
    state.nextPoolIdx = parsed.nextPoolIdx || 0;
    state.masteredUnified = parsed.masteredUnified || [];
    state.learnedUnified = parsed.learnedUnified || [];
    state.masteredCardIndex = parsed.masteredCardIndex || 0;
    state.settings = { ...state.settings, ...parsed.settings };
    state.stats = { ...state.stats, ...parsed.stats };
    state.cardOrder = parsed.cardOrder || {};
  }

  // 更新连续学习天数
  const today = new Date().toDateString();
  if (state.stats.lastStudyDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (state.stats.lastStudyDate === yesterday) {
      state.stats.streak++;
    } else if (state.stats.lastStudyDate === null) {
      state.stats.streak = 1;
    } else {
      state.stats.streak = 1;
    }
    state.stats.lastStudyDate = today;
    saveState();
  }
}

function renderWordLetters(word, containerId, phonetic) {

    // 为每个原始字符索引分配颜色
    const charColor = new Array(word.length).fill(null);

    phonemeLetterMap.forEach((letterIndices, phIdx) => {

      letterIndices.forEach(li => {

    });

}

// ========== 音标与字母同步高亮（精确映射） ==========

// 构建音素→字母位置映射
function buildPhonemeLetterMap(word, phonemes) {
  // 压缩单词：仅保留字母，去掉空格和标点
  const compact = word.toLowerCase().replace(/[^a-z]/g, '');
  // 压缩索引→原始单词字符索引
  const compactToOrig = [];
  for (let i = 0; i < word.length; i++) {
    if (/[a-zA-Z]/.test(word[i])) compactToOrig.push(i);
  }
  // 过滤重音符号
  const phList = phonemes.filter(p => p !== 'ˈ' && p !== 'ˌ');

  const result = []; // result[i] = 该音素对应的 compact 索引数组
  let pos = 0;

  for (const phoneme of phList) {
    const candidates = PHONEME_TO_SPELLING[phoneme];
    let matched = false;

    if (candidates) {
      // 尝试每个候选拼写
      for (const cand of candidates) {
        if (compact.substring(pos, pos + cand.length) === cand) {
          const indices = [];
          for (let j = 0; j < cand.length; j++) indices.push(pos + j);
          result.push(indices);
          pos += cand.length;
          matched = true;
          break;
        }
      }
      // 未匹配则跳过最多2个字母（静音字母），再试
      if (!matched) {
        for (let skip = 1; skip <= 2 && pos + skip < compact.length; skip++) {
          const tryPos = pos + skip;
          for (const cand of candidates) {
            if (compact.substring(tryPos, tryPos + cand.length) === cand) {
              // 跳过的字母归给上一个音素
              for (let s = 0; s < skip; s++) {
                if (result.length > 0) result[result.length - 1].push(pos + s);
              }
              const indices = [];
              for (let j = 0; j < cand.length; j++) indices.push(tryPos + j);
              result.push(indices);
              pos = tryPos + cand.length;
              matched = true;
              break;
            }
          }
          if (matched) break;
        }
      }
    }

    if (!matched) {
      if (pos < compact.length) { result.push([pos]); pos++; }
      else { result.push([]); }
    }
  }

  // 剩余字母归给最后一个音素
  while (pos < compact.length) {
    if (result.length > 0) result[result.length - 1].push(pos);
    pos++;
  }

  // compact 索引 → 原始单词字符索引（即 span 索引）
  return result.map(arr => arr.map(i => compactToOrig[i]).filter(i => i !== undefined));
}

function clearHighlight() {
  highlightTimers.forEach(t => clearTimeout(t));
  highlightTimers = [];
  document.querySelectorAll('.word-letter').forEach(el => {
    el.classList.remove('highlight');
    const permColor = el.dataset.permColor;
    if (permColor) {
      el.style.color = permColor;
      el.style.textShadow = `0 0 8px ${permColor}55`;
    } else {
      el.style.color = '';
      el.style.textShadow = '';
    }
    el.style.transform = '';
    el.style.fontWeight = '';
  });
  document.querySelectorAll('.phoneme').forEach(el => {
    el.classList.remove('highlight-sync');
    el.style.color = '';
    el.style.background = '';
    el.style.transform = '';
  });
}

function highlightSync(word) {
  // 仅在单词卡视图高亮
  const activeView = document.querySelector('.view.active');
  if (!activeView || activeView.id !== 'view-flashcard') return;
  if (!currentFlashcardData || !currentFlashcardData.phonetic) return;

  const wordEl = document.getElementById('fcWord');
  const phoneticEl = document.getElementById('fcPhonetic');
  if (!wordEl || !phoneticEl) return;

  const letterSpans = wordEl.querySelectorAll('.word-letter');
  const phonemeSpans = phoneticEl.querySelectorAll('.phoneme');
  if (letterSpans.length === 0 || phonemeSpans.length === 0) return;

  // 解析音标
  const phonemes = parsePhonetics(currentFlashcardData.phonetic);
  // 构建精确映射
  const phonemeLetterMap = buildPhonemeLetterMap(currentFlashcardData.word, phonemes);

  // 非重音音标的 span 索引
  const phonemeIdxs = [];
  phonemeSpans.forEach((s, i) => { if (!s.classList.contains('muted')) phonemeIdxs.push(i); });

  const numPhonemes = phonemeLetterMap.length;
  if (numPhonemes === 0) return;

  // 按每个音素覆盖的字母数分配时间
  const totalLetters = phonemeLetterMap.reduce((sum, arr) => sum + Math.max(arr.length, 1), 0);
  const duration = Math.max(600, currentFlashcardData.word.replace(/[^a-z]/gi, '').length * 130 / wordSpeechRate);

  let currentTime = 0;
  for (let i = 0; i < numPhonemes; i++) {
    const letterIndices = phonemeLetterMap[i];
    const letterCount = Math.max(letterIndices.length, 1);
    const phonemeDuration = (letterCount / totalLetters) * duration;
    const startTime = currentTime;

    const t = setTimeout(() => {
      // 清除上一帧：恢复永久颜色
      document.querySelectorAll('.word-letter').forEach(el => {
        const permColor = el.dataset.permColor;
        if (permColor) {
          el.style.color = permColor;
          el.style.textShadow = `0 0 8px ${permColor}55`;
        } else {
          el.style.color = '';
          el.style.textShadow = '';
        }
        el.style.transform = '';
        el.style.fontWeight = '';
      });
      document.querySelectorAll('.phoneme').forEach(el => {
        el.style.color = '';
        el.style.background = '';
        el.style.transform = '';
      });
      // 高亮该音素对应的所有字母 - 放大+加粗+增强发光
      const color = PHONEME_COLORS[i % PHONEME_COLORS.length];
      letterIndices.forEach(li => {
        if (letterSpans[li]) {
          letterSpans[li].style.color = color;
          letterSpans[li].style.textShadow = `0 0 18px ${color}cc`;
          letterSpans[li].style.transform = 'scale(1.3)';
          letterSpans[li].style.fontWeight = '900';
        }
      });
      // 高亮对应音标
      if (phonemeIdxs[i] !== undefined) {
        phonemeSpans[phonemeIdxs[i]].style.color = color;
        phonemeSpans[phonemeIdxs[i]].style.background = color + '30';
        phonemeSpans[phonemeIdxs[i]].style.transform = 'scale(1.2)';
      }
    }, startTime);
    highlightTimers.push(t);

    currentTime += phonemeDuration;
  }
}

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

// 初始化/补充活跃卡片到 20 张
function ensureActiveCards() {
  if (state.activeCards.length === 0 && state.nextPoolIdx === 0) {
    // 首次初始化
    state.activeCards = [];
    state.nextPoolIdx = 0;
  }
  // 过滤掉已掌握的
  const masteredSet = getMasteredSet();
  state.activeCards = state.activeCards.filter(idx => !masteredSet.has(idx));

  // 从池中补充到 MAX_ACTIVE_CARDS
  while (state.activeCards.length < MAX_ACTIVE_CARDS && state.nextPoolIdx < UNIFIED_WORDS.length) {
    const idx = state.nextPoolIdx;
    if (!masteredSet.has(idx)) {
      state.activeCards.push(idx);
    }
    state.nextPoolIdx++;
  }
}

  const list = getMasteredList();

  if (list.length === 0) {
    card.classList.remove('flipped');
    document.getElementById('mWord').innerHTML = '📝';
    document.getElementById('mCn').textContent = '还没有掌握的单词';

    document.getElementById('mProgress').textContent = '已掌握 0 个';
    document.getElementById('mDots').innerHTML = '';
    currentMasteredData = null;
    return;
  }

  if (state.masteredCardIndex >= list.length) state.masteredCardIndex = 0;
  const uIdx = list[state.masteredCardIndex];
  const word = UNIFIED_WORDS[uIdx];

  card.classList.remove('flipped');
  clearHighlight();

  const list = getMasteredList();

  state.masteredUnified = state.masteredUnified.filter(i => i !== uIdx);

  if (state.masteredWords[word.bankKey]) state.masteredWords[word.bankKey].delete(word.origIdx);

  showToast('已取消掌握，单词回到学习列表', 'info');

    if (state.masteredCardIndex >= state.masteredUnified.length) state.masteredCardIndex = 0;

}

// ========== 音标解析与逐音发音 ==========
const IPA_PHONEMES = [
  'iː','uː','ɑː','ɔː','ɜː','eɪ','aɪ','aʊ','ɔɪ','ɪə','eə','ʊə','əʊ',
  'tʃ','dʒ','θ','ð','ʃ','ʒ','ŋ',
  'æ','ɒ','ʌ','ʊ','ɪ','ə','e',
  'p','b','t','d','k','g','f','v','s','z','h','m','n','l','r','j','w',
  'ˈ','ˌ',
];
const PHONEME_SOUNDS = {
  'iː':'ee','uː':'oo','ɑː':'ah','ɔː':'aw','ɜː':'er',

// 音素→常见拼写映射（用于字母高亮定位）

// 音素高亮颜色调色板（每个音素组使用不同颜色）
const PHONEME_COLORS = [
  '#FF6B6B', // 珊瑚红
  '#4ECDC4', // 青绿
  '#FFD93D', // 金黄
  '#6BCB77', // 翠绿
  '#4D96FF', // 天蓝
  '#FF8FD0', // 粉红
  '#B59BDB', // 淡紫
  '#E67E22', // 橙色
  '#1ABC9C', // 碧绿
  '#F39C12', // 琥珀
];
function parsePhonetics(str) {
  const s = str.replace(/^\//,'').replace(/\/$/,'');
  const res = []; let i = 0;
  while (i < s.length) {
    let matched = false;
    for (const p of IPA_PHONEMES) {
      if (s.substring(i, i + p.length) === p) { res.push(p); i += p.length; matched = true; break; }
    }
    if (!matched) { res.push(s[i]); i++; }
  }
  return res;
}
function renderPhonetics(phoneticStr, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const phonemes = parsePhonetics(phoneticStr);
  container.innerHTML = '';
  container.className = 'phonetic-symbols';
  let nonMutedIdx = 0;
  phonemes.forEach((p, idx) => {
    const wrap = document.createElement('span');
    wrap.className = 'phoneme-wrap';
    const span = document.createElement('span');
    span.className = 'phoneme';
    if (p === 'ˈ' || p === 'ˌ') {
      span.classList.add('stress','muted'); span.textContent = p;
    } else if (PHONEME_SOUNDS[p] !== undefined && PHONEME_SOUNDS[p] !== '') {
      span.textContent = p; span.title = '点击播放此音标';
      const myIdx = nonMutedIdx;
      span.dataset.phIndex = myIdx;
      span.onclick = (e) => { e.stopPropagation(); speakPhoneme(p, span, myIdx); };
      nonMutedIdx++;
    } else {
      span.textContent = p; span.classList.add('muted');
    }
    wrap.appendChild(span); container.appendChild(wrap);
  });
}
function speakPhoneme(phoneme, span, phIndex) {
  const sound = PHONEME_SOUNDS[phoneme];
  if (!sound) return;
  window.speechSynthesis.cancel();
  clearHighlight();
  const u = new SpeechSynthesisUtterance(sound);
  u.lang = 'en-US'; u.rate = 0.4;
  window.speechSynthesis.speak(u);
  if (span) { span.classList.add('playing'); setTimeout(() => span.classList.remove('playing'), 500); }

  // 点击音标时高亮单词中对应的字母
  const activeView = document.querySelector('.view.active');
  if (!activeView || activeView.id !== 'view-flashcard') return;
  if (!currentFlashcardData || !currentFlashcardData.phonetic) return;
  if (phIndex === undefined) return;

  const wordEl = document.getElementById('fcWord');
  if (!wordEl) return;
  const letterSpans = wordEl.querySelectorAll('.word-letter');
  if (letterSpans.length === 0) return;

  const phonemes = parsePhonetics(currentFlashcardData.phonetic);
  const phonemeLetterMap = buildPhonemeLetterMap(currentFlashcardData.word, phonemes);

  if (phIndex >= phonemeLetterMap.length) return;

  const letterIndices = phonemeLetterMap[phIndex];
  const color = PHONEME_COLORS[phIndex % PHONEME_COLORS.length];

  // 高亮对应字母 - 放大+加粗+增强发光
  letterIndices.forEach(li => {
    if (letterSpans[li]) {
      letterSpans[li].style.color = color;
      letterSpans[li].style.textShadow = `0 0 18px ${color}cc`;
      letterSpans[li].style.transform = 'scale(1.3)';
      letterSpans[li].style.fontWeight = '900';
    }
  });
  // 高亮音标本身
  if (span) {
    span.style.color = color;
    span.style.background = color + '30';
    span.style.transform = 'scale(1.2)';
  }

  // 1.5秒后自动清除（恢复永久颜色）
  const t = setTimeout(() => {
    letterIndices.forEach(li => {
      if (letterSpans[li]) {
        const permColor = letterSpans[li].dataset.permColor;
        if (permColor) {
          letterSpans[li].style.color = permColor;
          letterSpans[li].style.textShadow = `0 0 8px ${permColor}55`;
        } else {
          letterSpans[li].style.color = '';
          letterSpans[li].style.textShadow = '';
        }
        letterSpans[li].style.transform = '';
        letterSpans[li].style.fontWeight = '';
      }
    });
    if (span) {
      span.style.color = '';
      span.style.background = '';
      span.style.transform = '';
    }
  }, 1500);
  highlightTimers.push(t);
}

// ========== 单词卡 ==========
function renderFlashcard() {
  ensureActiveCards();

  if (state.activeCards.length === 0) {
    clearHighlight();
    document.getElementById('flashcard').classList.remove('flipped');
    document.getElementById('fcWord').innerHTML = '🎉';
    document.getElementById('fcCn').textContent = '全部单词已掌握！';
    document.getElementById('fcPhonetic').innerHTML = '';
    document.getElementById('fcMeaning').textContent = '太厉害了！';
    document.getElementById('fcExample').innerHTML = '';
    document.getElementById('fcProgress').textContent = `全部掌握  ·  已掌握 ${state.masteredUnified.length}`;
    document.getElementById('fcDots').innerHTML = '';
    currentFlashcardData = null;
    return;
  }

  if (state.currentCardIndex >= state.activeCards.length) state.currentCardIndex = 0;
  const uIdx = state.activeCards[state.currentCardIndex];
  const word = UNIFIED_WORDS[uIdx];

  state.isFlipped = false;
  clearHighlight();
  document.getElementById('flashcard').classList.remove('flipped');
  renderWordLetters(word.word, 'fcWord', word.phonetic);
  document.getElementById('fcCn').textContent = word.meaning;
  renderPhonetics(word.phonetic, 'fcPhonetic');
  document.getElementById('fcMeaning').textContent = word.meaning;
  document.getElementById('fcExample').innerHTML = word.example;

  currentFlashcardData = { word: word.word, meaning: word.meaning, phonetic: word.phonetic };

  // 进度
  document.getElementById('fcProgress').textContent =
    `第 ${state.currentCardIndex + 1} / ${state.activeCards.length} 张  ·  已掌握 ${state.masteredUnified.length}  ·  词库进度 ${state.nextPoolIdx}/${UNIFIED_WORDS.length}`;

  // 圆点
  const dotsContainer = document.getElementById('fcDots');
  dotsContainer.innerHTML = '';
  state.activeCards.forEach((idx, i) => {
    const dot = document.createElement('div');
    dot.className = 'card-dot';
    if (i === state.currentCardIndex) dot.classList.add('active');
    dot.onclick = () => { state.currentCardIndex = i; renderFlashcard(); };
    dotsContainer.appendChild(dot);
  });

  if (state.settings.autoSpeak) {
    setTimeout(() => speakFlashcardWord(), 300);
  }
}

function flipCard() {
  state.isFlipped = !state.isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped');
}

function nextCard() {
  if (state.activeCards.length === 0) return;
  state.currentCardIndex = (state.currentCardIndex + 1) % state.activeCards.length;
  renderFlashcard();
}

function prevCard() {
  if (state.activeCards.length === 0) return;
  state.currentCardIndex = (state.currentCardIndex - 1 + state.activeCards.length) % state.activeCards.length;
  renderFlashcard();
}

function markLearned() {
  if (state.activeCards.length === 0) return;
  const uIdx = state.activeCards[state.currentCardIndex];

  // 添加到已掌握和已学
  if (!state.masteredUnified.includes(uIdx)) state.masteredUnified.push(uIdx);
  if (!state.learnedUnified.includes(uIdx)) state.learnedUnified.push(uIdx);

  // 同步旧结构（兼容统计）
  const word = UNIFIED_WORDS[uIdx];
  if (!state.learnedWords[word.bankKey]) state.learnedWords[word.bankKey] = new Set();
  if (!state.masteredWords[word.bankKey]) state.masteredWords[word.bankKey] = new Set();
  state.learnedWords[word.bankKey].add(word.origIdx);
  state.masteredWords[word.bankKey].add(word.origIdx);

  saveState();
  showToast('🎉 已掌握！自动补充新单词', 'success');

  setTimeout(() => {
    ensureActiveCards(); // 补充新词
    if (state.currentCardIndex >= state.activeCards.length) state.currentCardIndex = 0;
    renderFlashcard();
    renderDashboard();
  }, 500);
}

// ========== 选择题 ==========
function startQuiz() {
  const words = getWordList();
  const quizCount = Math.min(10, words.length);
  const indices = shuffleArray([...Array(words.length).keys()]).slice(0, quizCount);

  state.quizState = {
    questions: indices.map(idx => generateQuizQuestion(idx)),
    currentIndex: 0,
    correct: 0,
    answered: false,
    startTime: Date.now()
  };
  renderQuiz();
}

function generateQuizQuestion(correctIdx) {
  const words = getWordList();
  const correctWord = words[correctIdx];
  const type = Math.random() > 0.5 ? 'cn2en' : 'en2cn';

  // 生成干扰项
  const otherIndices = shuffleArray([...Array(words.length).keys()].filter(i => i !== correctIdx)).slice(0, 3);
  const options = shuffleArray([correctIdx, ...otherIndices]);

  return {
    type,
    correctIdx,
    options,
    correctWord,
    questionText: type === 'cn2cn' ? correctWord.meaning : (type === 'cn2en' ? correctWord.meaning : correctWord.word),
    optionTexts: type === 'en2cn'
      ? options.map(i => words[i].meaning)
      : options.map(i => words[i].word)
  };
}

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  const qs = state.quizState;

  if (qs.currentIndex >= qs.questions.length) {
    // 结果页
    const score = Math.round(qs.correct / qs.questions.length * 100);
    const time = Math.round((Date.now() - qs.startTime) / 1000);
    let msg = '';
    if (score >= 90) msg = '太棒了！你是英语达人！🏆';
    else if (score >= 70) msg = '不错！继续加油！💪';
    else if (score >= 50) msg = '还需多练习，别灰心！📚';
    else msg = '建议多看单词卡，再来挑战！📖';

    container.innerHTML = `
      <div class="quiz-result">
        <div style="font-size:64px;">${score >= 90 ? '🏆' : score >= 70 ? '🎉' : score >= 50 ? '💪' : '📚'}</div>
        <div class="quiz-score">${score}%</div>
        <div style="color:var(--text-secondary);margin-bottom:8px;">答对 ${qs.correct} / ${qs.questions.length} 题 · 用时 ${time} 秒</div>
        <div class="quiz-result-msg">${msg}</div>
        <div style="display:flex;gap:12px;justify-content:center;">
          <button class="btn btn-primary" onclick="startQuiz()">🔄 再来一轮</button>
          <button class="btn btn-secondary" onclick="document.querySelector('[data-view=flashcard]').click()">🎴 去看单词卡</button>
        </div>
      </div>
    `;
    return;
  }

  const q = qs.questions[qs.currentIndex];
  const progress = (qs.currentIndex / qs.questions.length) * 100;

  container.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-progress-text">第 ${qs.currentIndex + 1} / ${qs.questions.length} 题</div>
      <div class="quiz-timer">⏱️ <span id="quizTimer">0</span>s</div>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
    <div class="quiz-question">
      <div class="quiz-question-text">${q.type === 'en2cn' ? q.questionText : q.questionText}</div>
      <div class="quiz-question-hint">${q.type === 'en2cn' ? '选择正确的中文释义' : '选择正确的英文单词'}</div>
      ${q.type === 'cn2en' ? `<button class="btn btn-accent" style="margin-bottom:16px;" onclick="speakWord('${q.correctWord.word}')">🔊 听发音</button>` : ''}
      <div class="quiz-options" id="quizOptions">
        ${q.optionTexts.map((text, i) => `
          <div class="quiz-option" onclick="answerQuiz(${i})">
            <div class="quiz-option-letter">${String.fromCharCode(65 + i)}</div>
            <span>${text}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // 计时器
  qs.questionStart = Date.now();
  if (qs.timerInterval) clearInterval(qs.timerInterval);
  qs.timerInterval = setInterval(() => {
    const elapsed = Math.round((Date.now() - qs.questionStart) / 1000);
    const timerEl = document.getElementById('quizTimer');
    if (timerEl) timerEl.textContent = elapsed;
  }, 1000);
}

function answerQuiz(optionIdx) {
  const qs = state.quizState;
  if (qs.answered) return;
  qs.answered = true;
  if (qs.timerInterval) clearInterval(qs.timerInterval);

  const q = qs.questions[qs.currentIndex];
  const correctOptionIdx = q.options.indexOf(q.correctIdx);
  const isCorrect = optionIdx === correctOptionIdx;

  state.stats.totalAnswered++;
  if (isCorrect) {
    state.stats.totalCorrect++;
    qs.correct++;
  }

  // 标记选项
  const options = document.querySelectorAll('.quiz-option');
  options.forEach((opt, i) => {
    opt.style.cursor = 'default';
    if (i === correctOptionIdx) opt.classList.add('correct');
    else if (i === optionIdx) opt.classList.add('wrong');
  });

  // 朗读正确单词
  if (q.type === 'cn2en') speakWord(q.correctWord.word);

  saveState();

  setTimeout(() => {
    qs.currentIndex++;
    qs.answered = false;
    renderQuiz();
  }, isCorrect ? 1000 : 1800);
}

// ========== 拼写练习 ==========
function startSpelling() {
  const words = getWordList();
  const mastered = getMasteredSet();
  // 优先选择已学过的词
  let pool = [...getLearnedSet()].filter(i => !mastered.has(i));
  if (pool.length < 5) pool = [...Array(words.length).keys()];
  const indices = shuffleArray(pool).slice(0, Math.min(10, pool.length));

  state.spellingState = {
    indices,
    currentIndex: 0,
    correct: 0,
    total: indices.length,
    answered: false
  };
  renderSpelling();
}

function renderSpelling() {
  const container = document.getElementById('spellingCard');
  const ss = state.spellingState;

  if (ss.currentIndex >= ss.total) {
    const score = Math.round(ss.correct / ss.total * 100);
    container.innerHTML = `
      <div class="quiz-result">
        <div style="font-size:64px;">${score >= 80 ? '✨' : '📝'}</div>
        <div class="quiz-score">${score}%</div>
        <div style="color:var(--text-secondary);">拼对 ${ss.correct} / ${ss.total} 个单词</div>
        <div class="quiz-result-msg">${score >= 80 ? '拼写高手！' : '多练习就能进步！'}</div>
        <button class="btn btn-primary" onclick="startSpelling()">🔄 再来一轮</button>
      </div>
    `;
    return;
  }

  const words = getWordList();
  const word = words[ss.indices[ss.currentIndex]];
  ss.currentWord = word;
  ss.answered = false;

  // 字母提示（首字母 + 下划线）
  const hint = word.word[0] + '_'.repeat(word.word.length - 1);

  container.innerHTML = `
    <div style="margin-bottom:8px;color:var(--text-secondary);font-size:14px;">第 ${ss.currentIndex + 1} / ${ss.total} 题</div>
    <div class="spelling-meaning">${word.meaning}</div>
    <div class="spelling-phonetic">${word.phonetic}</div>
    <button class="btn btn-accent" onclick="speakWord('${word.word}')" style="margin-bottom:20px;">🔊 听发音</button>
    <input type="text" class="spelling-input" id="spellingInput" placeholder="在此输入单词..." autocomplete="off"
      onkeydown="if(event.key==='Enter') checkSpelling()" />
    <div class="spelling-hint" id="spellingHint">
      <span class="letter-hint">${hint}</span> (${word.word.length} 个字母)
    </div>
    <div style="margin-top:20px;display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-secondary" onclick="skipSpelling()">⏭️ 跳过</button>
      <button class="btn btn-primary" onclick="checkSpelling()">✅ 提交</button>
    </div>
  `;

  document.getElementById('spellingInput').focus();
}

function checkSpelling() {
  const ss = state.spellingState;
  if (ss.answered) return;
  ss.answered = true;

  const input = document.getElementById('spellingInput');
  const userAnswer = input.value.trim().toLowerCase();
  const correctAnswer = ss.currentWord.word.toLowerCase();
  const isCorrect = userAnswer === correctAnswer;

  state.stats.totalAnswered++;
  if (isCorrect) {
    state.stats.totalCorrect++;
    ss.correct++;
    input.classList.add('correct');
    showToast('✅ 拼对了！', 'success');
  } else {
    input.classList.add('wrong');
    document.getElementById('spellingHint').innerHTML = `正确答案：<span class="letter-hint" style="color:var(--success)">${ss.currentWord.word}</span>`;
    showToast('❌ 拼错了', 'error');
  }

  speakWord(ss.currentWord.word);
  saveState();

  setTimeout(() => {
    ss.currentIndex++;
    renderSpelling();
  }, isCorrect ? 1200 : 2500);
}

function skipSpelling() {
  const ss = state.spellingState;
  ss.currentIndex++;
  renderSpelling();
}

function startListeningMode(mode) {
  ensureActiveCards();

  // 收集单词：生词模式只用活跃卡；混合模式用已掌握 + 活跃卡
  const activeWords = state.activeCards.map(idx => UNIFIED_WORDS[idx]);
  let words;

  if (mode === 'mixed') {
    const masteredWords = state.masteredUnified.map(idx => UNIFIED_WORDS[idx]);
    words = [...activeWords, ...masteredWords];
  } else {
    words = activeWords;
  }

  // 去重（以防同一词出现在两个集合）
  const seen = new Set();
  words = words.filter(w => {
    if (seen.has(w.word)) return false;
    seen.add(w.word);
    return true;
  });

  if (words.length === 0) {
    document.getElementById('listeningCard').innerHTML = `
      <div class="quiz-result">
        <div style="font-size:64px;">🎉</div>
        <div style="font-size:24px;font-weight:700;margin:12px 0;">${mode === 'mixed' ? '还没有已掌握的单词' : '全部单词已掌握！'}</div>
        <div style="color:var(--text-secondary);margin-bottom:20px;">${mode === 'mixed' ? '先在单词卡中学习并掌握一些单词后再来混合训练' : '听力训练需要先有学习中的单词'}</div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-secondary" onclick="showListeningModeSelect()">◀ 返回选择模式</button>
          <button class="btn btn-primary" onclick="document.querySelector('[data-view=flashcard]').click()">🎴 去看单词卡</button>
        </div>
      </div>
    `;
    state.listeningState = null;
    return;
  }

  const listenCount = mode === 'mixed' ? Math.min(50, words.length) : Math.min(10, words.length);
  const indices = shuffleArray([...Array(words.length).keys()]).slice(0, listenCount);

  state.listeningState = {
    mode,
    words,
    indices,
    currentIndex: 0,
    correct: 0,
    total: indices.length,
    answered: false,
    speed: 0.9
  };
  renderListening();
}

function renderListening() {
  const container = document.getElementById('listeningCard');
  const ls = state.listeningState;

  if (ls.currentIndex >= ls.total) {
    const score = Math.round(ls.correct / ls.total * 100);
    const modeLabel = ls.mode === 'mixed' ? '🔀 混合模式' : '📖 生词模式';
    container.innerHTML = `
      <div class="quiz-result">
        <div style="font-size:64px;">${score >= 80 ? '👂' : '🎧'}</div>
        <div class="quiz-score">${score}%</div>
        <div style="color:var(--text-secondary);">听对 ${ls.correct} / ${ls.total} 个单词</div>
        <div class="quiz-result-msg">${score >= 80 ? '听力很好！' : '多听多练！'}</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">${modeLabel}</div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="startListeningMode('${ls.mode}')">🔄 再来一轮</button>
          <button class="btn btn-secondary" onclick="showListeningModeSelect()">◀ 切换模式</button>
        </div>
      </div>
    `;
    return;
  }

  const words = ls.words;
  const correctIdx = ls.indices[ls.currentIndex];
  const correctWord = words[correctIdx];
  ls.currentWord = correctWord;
  ls.answered = false;

  // 生成选项
  const otherIndices = shuffleArray([...Array(words.length).keys()].filter(i => i !== correctIdx)).slice(0, 3);
  const options = shuffleArray([correctIdx, ...otherIndices]);
  ls.options = options;
  ls.correctOptionIdx = options.indexOf(correctIdx);

  const modeTag = ls.mode === 'mixed'
    ? '<span class="listen-mode-tag mixed">混合模式</span>'
    : '<span class="listen-mode-tag new">生词模式</span>';

  container.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="color:var(--text-secondary);font-size:14px;">第 ${ls.currentIndex + 1} / ${ls.total} 题</span>
      ${modeTag}
    </div>
    <div class="speed-control">
      <button class="speed-btn ${ls.speed===0.6?'active':''}" onclick="setListenSpeed(0.6)">慢速</button>
      <button class="speed-btn ${ls.speed===0.9?'active':''}" onclick="setListenSpeed(0.9)">正常</button>
      <button class="speed-btn ${ls.speed===1.1?'active':''}" onclick="setListenSpeed(1.1)">快速</button>
    </div>
    <button class="listen-btn" id="listenBtn" onclick="playListenWord()">🔊</button>
    <p style="color:var(--text-secondary);margin-bottom:16px;">点击按钮听单词，选择正确的释义</p>
    <div class="listen-options" id="listenOptions">
      ${options.map((idx, i) => `
        <div class="listen-option" onclick="answerListening(${i})">
          ${words[idx].meaning}
        </div>
      `).join('')}
    </div>
    <div style="margin-top:20px;">
      <button class="btn btn-secondary" style="font-size:13px;padding:8px 16px;" onclick="showListeningModeSelect()">◀ 切换模式</button>
    </div>
  `;

  // 自动播放
  setTimeout(() => playListenWord(), 500);
}

function setListenSpeed(speed) {
  state.listeningState.speed = speed;
  renderListening();
}

function playListenWord() {
  const ls = state.listeningState;
  const btn = document.getElementById('listenBtn');
  btn.classList.add('playing');

  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(ls.currentWord.word);
  utterance.lang = 'en-US';
  utterance.rate = ls.speed;
  utterance.onend = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(utterance);
}

function answerListening(optionIdx) {
  const ls = state.listeningState;
  if (ls.answered) return;
  ls.answered = true;

  const isCorrect = optionIdx === ls.correctOptionIdx;
  state.stats.totalAnswered++;
  if (isCorrect) {
    state.stats.totalCorrect++;
    ls.correct++;
  }

  const options = document.querySelectorAll('.listen-option');
  options.forEach((opt, i) => {
    opt.style.cursor = 'default';
    if (i === ls.correctOptionIdx) opt.classList.add('correct');
    else if (i === optionIdx) opt.classList.add('wrong');
  });

  // 显示单词
  const card = document.getElementById('listeningCard');
  const hint = document.createElement('div');
  hint.style.cssText = 'margin-top:16px;font-size:20px;font-weight:700;color:var(--accent);';
  hint.innerHTML = `${ls.currentWord.word} <span style="font-size:14px;color:var(--text-secondary);font-weight:400;">${ls.currentWord.phonetic}</span>`;
  card.appendChild(hint);

  saveState();

  setTimeout(() => {
    ls.currentIndex++;
    renderListening();
  }, isCorrect ? 1500 : 2500);
}

// ========== 设置 ==========
function toggleSetting(key) {
  state.settings[key] = !state.settings[key];
  document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1)).classList.toggle('on');
  saveState();
  showToast(state.settings[key] ? '已开启' : '已关闭', 'success');
}

function resetProgress() {
  if (!confirm('确定要重置所有学习进度吗？此操作不可撤销！')) return;
  localStorage.removeItem('leximaster_data');
  state.learnedWords = {};
  state.masteredWords = {};
  state.cardOrder = {};
  state.activeCards = [];
  state.nextPoolIdx = 0;
  state.masteredUnified = [];
  state.learnedUnified = [];
  state.masteredCardIndex = 0;
  state.currentCardIndex = 0;
  state.stats = { totalAnswered: 0, totalCorrect: 0, streak: 1, lastStudyDate: new Date().toDateString() };
  ensureActiveCards();
  showToast('已重置所有进度', 'success');
  renderDashboard();
}

// ========== 键盘快捷键 ==========
document.addEventListener('keydown', (e) => {
  const activeView = document.querySelector('.view.active').id;
  if (activeView === 'view-flashcard') {
    if (e.key === 'ArrowRight') nextCard();
    else if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === ' ') { e.preventDefault(); replayFlashcard(); }
    else if (e.key === 'Enter') markLearned();
  } else if (activeView === 'view-mastered') {
    if (e.key === 'ArrowRight') nextMasteredCard();
    else if (e.key === 'ArrowLeft') prevMasteredCard();
    else if (e.key === ' ') { e.preventDefault(); speakMasteredWord(); }
  } else if (activeView === 'view-spelling') {
    // Enter handled in input
  }
});

// ========== 初始化 ==========
function generateVersion() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const h = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  return 'v' + y + '.' + m + '.' + d + '.' + h + min;
}
document.getElementById('versionBadge').textContent = generateVersion();

// ========== 应用初始化（带认证检查） ==========
async function initApp() {
  buildUnifiedWords();

  // 检查是否有已登录的会话
  if (sbClient) {
    const { data: { session } } = await sbClient.auth.getSession();
    if (session && session.user) {
      currentUser = session.user;
      hideAuthUI();
      showUserArea(session.user.email || '用户');
      updateSyncIndicator('已登录');
      await loadCloudProgress();  // 从云端加载进度
    } else {
      showAuthUI();  // 未登录，显示登录界面
    }
  }

  loadState();           // 始终加载本地数据作为基础/备份
  ensureActiveCards();
  renderDashboard();
}

initApp();
</script>
</body>
</html>
